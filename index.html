<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <!-- Importing beautiful fonts from Google -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Base page styling and gradient background */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* This keeps the page from scrolling when hearts float */
        }

        /* The frosted glass centerpiece */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(255, 105, 135, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 10; /* Keeps the card in front of the hearts */
            animation: pulse 4s infinite alternate; /* Soft breathing animation */
        }

        /* Romantic cursive text */
        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d63384;
            font-size: 4.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(214, 51, 132, 0.2);
        }

        p {
            color: #444;
            font-size: 1.2rem;
            margin-top: 15px;
            font-weight: 400;
        }

        /* Styling for the animated hearts */
        .heart {
            position: absolute;
            bottom: -10vh; /* Start slightly below the screen */
            z-index: 1;
        }

        /* The animation that makes the card slowly pulse */
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        /* The animation that makes the hearts float up and fade away */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Main Content Container -->
    <div class="glass-card">
        <h1>Happy Birthday my love</h1>
        <p>I made this little corner of the internet just for you. ❤️</p>
    </div>

    <!-- JavaScript to generate continuous floating hearts -->
    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '💖';
            
            // Randomize the starting position from left to right
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Randomize the animation speed (between 3s and 6s)
            heart.style.animation = `floatUp ${Math.random() * 3 + 3}s linear infinite`;
            
            // Randomize the size of the hearts
            heart.style.fontSize = Math.random() * 20 + 15 + 'px'; 
            
            document.body.appendChild(heart);

            // Remove the heart from the code after 6 seconds so the browser doesn't crash
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        // Spawn a new heart every 400 milliseconds
        setInterval(createHeart, 400);
    </script>
</body>
</html>
